name: pixelrats
description: "PixelRats — Focus Tamagotchi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flame: ^1.28.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sprites/previews/
    - assets/sprites/
